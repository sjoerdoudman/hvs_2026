title: 'Multi Column Text Block'
fields:
  -
    handle: cols
    field:
      placeholder: '3'
      min: 2
      max: 4
      type: integer
      display: 'Number of columns'
      default: '3'
  -
    handle: items
    field:
      type: replicator
      display: Items
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            col:
              display: Col
              fields:
                -
                  handle: title
                  field:
                    type: text
                    display: Title
                -
                  handle: text
                  field:
                    buttons:
                      - bold
                      - italic
                      - unorderedlist
                      - orderedlist
                      - anchor
                    container: assets
                    remove_empty_nodes: false
                    type: bard
                    display: Text
                -
                  handle: expanded_text
                  field:
                    buttons:
                      - bold
                      - italic
                      - unorderedlist
                      - orderedlist
                      - anchor
                    container: assets
                    remove_empty_nodes: false
                    type: bard
                    display: 'Expanded text'
  -
    import: buttons
