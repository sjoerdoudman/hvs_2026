title: 'Text + Image block'
fields:
  -
    handle: image
    field:
      container: assets
      max_files: 1
      type: assets
      display: Image
  -
    handle: title
    field:
      type: text
      display: Title
  -
    import: buttons
  -
    handle: text
    field:
      buttons:
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
      container: assets
      remove_empty_nodes: false
      type: bard
      display: Text
